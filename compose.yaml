services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18}
    container_name: ${POSTGRES_CONTAINER_NAME:-topicos-av2-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-app_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  judge-web:
    build:
      context: .
    container_name: ${WEB_CONTAINER_NAME:-topicos-av2-judge-web}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app_dev}
      BACKUP_ROOT_FILE: /workspace/backup_atividade_2.sql
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    volumes:
      - ./outputs:/app/outputs
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
